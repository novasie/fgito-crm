# FGITO CRM — production stack for a single VM.
# All app services run the LOCALLY-BUILT image `fgito-crm:${TAG}` (built on the VM by
# build-on-vm.sh — no registry). MariaDB + Redis are containers with volumes. Caddy
# terminates HTTPS for crm.fgito.com and reverse-proxies to the frontend.
#
# Config comes from .env (see .env.example). First `up` auto-creates the site + installs
# crm (running your after_install seeds).

x-app: &app
  image: fgito-crm:${TAG:-latest}
  pull_policy: never          # image is built locally on the VM, never pulled
  restart: unless-stopped
  networks: [frappe]
  volumes:
    - sites:/home/frappe/frappe-bench/sites
    - logs:/home/frappe/frappe-bench/logs

services:
  backend:
    <<: *app

  configurator:
    <<: *app
    restart: "no"
    entrypoint: ["bash", "-c"]
    command:
      - >
        ls -1 apps > sites/apps.txt;
        bench set-config -g db_host $$DB_HOST;
        bench set-config -gp db_port $$DB_PORT;
        bench set-config -g redis_cache "redis://$$REDIS_CACHE";
        bench set-config -g redis_queue "redis://$$REDIS_QUEUE";
        bench set-config -g redis_socketio "redis://$$REDIS_QUEUE";
        bench set-config -gp socketio_port $$SOCKETIO_PORT;
    environment:
      DB_HOST: db
      DB_PORT: "3306"
      REDIS_CACHE: redis-cache:6379
      REDIS_QUEUE: redis-queue:6379
      SOCKETIO_PORT: "9000"
    depends_on:
      db:
        condition: service_healthy

  create-site:
    <<: *app
    restart: "no"
    depends_on:
      configurator:
        condition: service_completed_successfully
    entrypoint: ["bash", "-c"]
    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
              [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]]; do
          echo "waiting for common_site_config.json"; sleep 3;
          if (( `date +%s`-start > 120 )); then echo "timeout"; exit 1; fi;
        done;
        if [ -d "sites/${SITE_NAME}" ]; then echo "site ${SITE_NAME} already exists — skipping"; exit 0; fi;
        bench new-site \
          --mariadb-user-host-login-scope='%' \
          --admin-password="${ADMIN_PASSWORD}" \
          --db-root-username=root \
          --db-root-password="${DB_PASSWORD}" \
          --install-app crm \
          --set-default "${SITE_NAME}";
        bench --site "${SITE_NAME}" set-config host_name "https://${SITE_NAME}";

  frontend:
    <<: *app
    depends_on: [backend, websocket]
    command: ["nginx-entrypoint.sh"]
    environment:
      BACKEND: backend:8000
      SOCKETIO: websocket:9000
      FRAPPE_SITE_NAME_HEADER: $$host
      UPSTREAM_REAL_IP_ADDRESS: 127.0.0.1
      UPSTREAM_REAL_IP_HEADER: X-Forwarded-For
      UPSTREAM_REAL_IP_RECURSIVE: "off"
      PROXY_READ_TIMEOUT: "120"
      CLIENT_MAX_BODY_SIZE: 50m
    ports:
      # localhost-only: your existing host nginx reverse-proxies crm.fgito.com to this port.
      # MariaDB/Redis stay internal (not published).
      - "127.0.0.1:${HTTP_PORT:-8080}:8080"

  websocket:
    <<: *app
    command: ["node", "/home/frappe/frappe-bench/apps/frappe/socketio.js"]
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  queue-short:
    <<: *app
    command: ["bench", "worker", "--queue", "short,default"]
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  queue-long:
    <<: *app
    command: ["bench", "worker", "--queue", "long,default,short"]
    environment:
      FRAPPE_REDIS_CACHE: redis://redis-cache:6379
      FRAPPE_REDIS_QUEUE: redis://redis-queue:6379

  scheduler:
    <<: *app
    command: ["bench", "schedule"]

  db:
    image: mariadb:10.6
    restart: unless-stopped
    networks: [frappe]
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --skip-character-set-client-handshake
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 15s
      interval: 5s
      timeout: 5s
      retries: 15
    volumes:
      - db-data:/var/lib/mysql

  redis-cache:
    image: redis:6.2-alpine
    restart: unless-stopped
    networks: [frappe]

  redis-queue:
    image: redis:6.2-alpine
    restart: unless-stopped
    networks: [frappe]
    volumes:
      - redis-queue-data:/data

volumes:
  sites:
  logs:
  db-data:
  redis-queue-data:

networks:
  frappe:
    driver: bridge
