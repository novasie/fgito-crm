# FGITO CRM — server block for your EXISTING host nginx (same pattern as dev-web.fgito.com → :4000).
#
# Install on the VM:
#   sudo cp deploy/nginx-crm.conf /etc/nginx/sites-available/crm.fgito.com
#   sudo ln -s /etc/nginx/sites-available/crm.fgito.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d crm.fgito.com        # adds the SSL listener + http→https redirect
#
# The CRM web container publishes on 127.0.0.1:8080 (compose HTTP_PORT); nginx proxies to it.

server {
    listen 80;
    server_name crm.fgito.com;

    # allow large uploads (attachments, imports)
    client_max_body_size 50m;

    location / {
        proxy_pass http://127.0.0.1:8080;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade — required for CRM realtime (socket.io)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
    }
}
